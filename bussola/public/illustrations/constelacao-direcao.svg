<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 280" width="280" height="280" role="img" aria-label="Constelação representando direção">
  <!-- Fundo decorativo (estrelas distantes) -->
  <g fill="#8B6F47" opacity="0.25">
    <circle cx="40" cy="30" r="1.5"/>
    <circle cx="220" cy="40" r="1.5"/>
    <circle cx="250" cy="220" r="1.5"/>
    <circle cx="30" cy="240" r="1.5"/>
    <circle cx="180" cy="250" r="1.5"/>
    <circle cx="60" cy="180" r="1.5"/>
    <circle cx="245" cy="120" r="1.5"/>
  </g>

  <!-- Linhas conectando estrelas (constelação em forma de seta apontando pra cima-direita) -->
  <g stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round" opacity="0.7">
    <line x1="70" y1="220" x2="120" y2="180"/>
    <line x1="120" y1="180" x2="170" y2="140"/>
    <line x1="170" y1="140" x2="220" y2="80"/>
    <line x1="170" y1="140" x2="200" y2="160"/>
    <line x1="170" y1="140" x2="160" y2="100"/>
  </g>

  <!-- Estrelas principais -->
  <g fill="#5C4A30">
    <!-- Estrela 1 (canto inferior esquerdo) -->
    <g transform="translate(70,220)">
      <path d="M 0 -8 L 2 -2 L 8 0 L 2 2 L 0 8 L -2 2 L -8 0 L -2 -2 Z"/>
    </g>
    <!-- Estrela 2 -->
    <g transform="translate(120,180)">
      <path d="M 0 -6 L 1.5 -1.5 L 6 0 L 1.5 1.5 L 0 6 L -1.5 1.5 L -6 0 L -1.5 -1.5 Z"/>
    </g>
    <!-- Estrela 3 (centro - maior) -->
    <g transform="translate(170,140)">
      <path d="M 0 -12 L 3 -3 L 12 0 L 3 3 L 0 12 L -3 3 L -12 0 L -3 -3 Z" fill="#8B6F47"/>
    </g>
    <!-- Estrela 4 (topo direito) -->
    <g transform="translate(220,80)">
      <path d="M 0 -10 L 2.5 -2.5 L 10 0 L 2.5 2.5 L 0 10 L -2.5 2.5 L -10 0 L -2.5 -2.5 Z"/>
    </g>
    <!-- Estrelas auxiliares -->
    <g transform="translate(200,160)">
      <path d="M 0 -5 L 1 -1 L 5 0 L 1 1 L 0 5 L -1 1 L -5 0 L -1 -1 Z"/>
    </g>
    <g transform="translate(160,100)">
      <path d="M 0 -5 L 1 -1 L 5 0 L 1 1 L 0 5 L -1 1 L -5 0 L -1 -1 Z"/>
    </g>
  </g>

  <!-- Aro central decorativo -->
  <circle cx="170" cy="140" r="30" fill="none" stroke="#8B6F47" stroke-width="0.5" stroke-dasharray="2 3" opacity="0.4"/>
</svg>
