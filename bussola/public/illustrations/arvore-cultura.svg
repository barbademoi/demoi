<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 300" width="300" height="300" role="img" aria-label="Árvore representando cultura">
  <!-- Linha do solo -->
  <line x1="40" y1="170" x2="260" y2="170" stroke="#8B6F47" stroke-width="2" stroke-dasharray="4 4" opacity="0.4"/>

  <!-- Copa (folhas em camadas) -->
  <g fill="none" stroke="#8B6F47" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <path d="M 150 30 C 100 50, 90 90, 110 110 C 80 110, 60 140, 90 160 L 210 160 C 240 140, 220 110, 190 110 C 210 90, 200 50, 150 30 Z"/>
  </g>
  <!-- Detalhe interno da copa -->
  <g fill="#8B6F47" opacity="0.15">
    <circle cx="130" cy="80" r="14"/>
    <circle cx="170" cy="100" r="12"/>
    <circle cx="150" cy="130" r="10"/>
  </g>

  <!-- Tronco -->
  <path d="M 140 160 L 142 220 L 158 220 L 160 160 Z" fill="#5C4A30"/>
  <!-- Detalhe do tronco -->
  <line x1="150" y1="170" x2="150" y2="215" stroke="#8B6F47" stroke-width="1.5" opacity="0.5"/>

  <!-- Raízes profundas (representam cultura/fundação) -->
  <g fill="none" stroke="#5C4A30" stroke-width="3" stroke-linecap="round">
    <path d="M 150 220 C 140 240, 110 250, 80 270"/>
    <path d="M 150 220 C 145 245, 125 265, 105 280"/>
    <path d="M 150 220 C 150 250, 150 270, 150 285"/>
    <path d="M 150 220 C 155 245, 175 265, 195 280"/>
    <path d="M 150 220 C 160 240, 190 250, 220 270"/>
  </g>
  <!-- Raízes secundárias finas -->
  <g fill="none" stroke="#8B6F47" stroke-width="1.5" stroke-linecap="round" opacity="0.6">
    <path d="M 100 260 L 95 275"/>
    <path d="M 115 270 L 112 282"/>
    <path d="M 180 270 L 183 282"/>
    <path d="M 200 265 L 205 278"/>
  </g>
</svg>
