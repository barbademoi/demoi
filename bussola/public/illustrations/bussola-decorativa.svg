<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400" role="img" aria-label="Bússola decorativa">
  <!-- Rosa-dos-ventos ao redor -->
  <g stroke="#8B6F47" stroke-width="1.5" fill="none" opacity="0.4">
    <line x1="200" y1="20" x2="200" y2="50"/>
    <line x1="200" y1="350" x2="200" y2="380"/>
    <line x1="20" y1="200" x2="50" y2="200"/>
    <line x1="350" y1="200" x2="380" y2="200"/>
    <line x1="73" y1="73" x2="93" y2="93"/>
    <line x1="307" y1="93" x2="327" y2="73"/>
    <line x1="73" y1="327" x2="93" y2="307"/>
    <line x1="307" y1="307" x2="327" y2="327"/>
  </g>
  <!-- Marcadores cardeais -->
  <g fill="#5C4A30" font-family="serif" font-size="14" font-weight="700" text-anchor="middle">
    <text x="200" y="14">N</text>
    <text x="200" y="392">S</text>
    <text x="13" y="205">O</text>
    <text x="389" y="205">L</text>
  </g>
  <!-- Anel externo decorativo -->
  <circle cx="200" cy="200" r="160" fill="none" stroke="#8B6F47" stroke-width="1.5" stroke-dasharray="2 4" opacity="0.6"/>
  <!-- Círculo principal da bússola -->
  <circle cx="200" cy="200" r="130" fill="none" stroke="#8B6F47" stroke-width="14"/>
  <!-- Agulha diamante -->
  <path d="M 200 90 L 240 200 L 200 200 Z" fill="#5C4A30"/>
  <path d="M 200 90 L 160 200 L 200 200 Z" fill="#8B6F47"/>
  <path d="M 200 310 L 240 200 L 200 200 Z" fill="#8B6F47"/>
  <path d="M 200 310 L 160 200 L 200 200 Z" fill="#A88A5E"/>
  <!-- Ponto central -->
  <circle cx="200" cy="200" r="10" fill="#FFFFFF" stroke="#8B6F47" stroke-width="2"/>
</svg>
