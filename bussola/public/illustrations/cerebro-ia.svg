<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320" role="img" aria-label="Cérebro representando a IA mentora">
  <!-- Aura sutil -->
  <circle cx="160" cy="160" r="140" fill="none" stroke="#8B6F47" stroke-width="1" stroke-dasharray="2 6" opacity="0.3"/>

  <!-- Cérebro: duas metades estilizadas -->
  <g fill="none" stroke="#8B6F47" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <!-- Hemisfério esquerdo -->
    <path d="M 160 60 C 110 60, 70 100, 75 150 C 65 165, 70 195, 95 210 C 95 230, 120 250, 150 245 C 155 255, 158 260, 160 260"/>
    <!-- Hemisfério direito -->
    <path d="M 160 60 C 210 60, 250 100, 245 150 C 255 165, 250 195, 225 210 C 225 230, 200 250, 170 245 C 165 255, 162 260, 160 260"/>
    <!-- Sulcos internos esquerdo -->
    <path d="M 110 110 C 130 120, 130 140, 115 155"/>
    <path d="M 100 170 C 120 180, 125 200, 110 215"/>
    <!-- Sulcos internos direito -->
    <path d="M 210 110 C 190 120, 190 140, 205 155"/>
    <path d="M 220 170 C 200 180, 195 200, 210 215"/>
    <!-- Linha central separando hemisférios -->
    <line x1="160" y1="60" x2="160" y2="260" stroke-dasharray="3 5" opacity="0.5"/>
  </g>

  <!-- Nós de conhecimento (princípios consagrados) -->
  <g fill="#5C4A30">
    <circle cx="100" cy="130" r="4"/>
    <circle cx="135" cy="100" r="4"/>
    <circle cx="125" cy="180" r="4"/>
    <circle cx="105" cy="215" r="4"/>
    <circle cx="220" cy="130" r="4"/>
    <circle cx="185" cy="100" r="4"/>
    <circle cx="195" cy="180" r="4"/>
    <circle cx="215" cy="215" r="4"/>
  </g>
  <!-- Conexões entre nós (rede de conhecimento) -->
  <g stroke="#8B6F47" stroke-width="1" opacity="0.5">
    <line x1="100" y1="130" x2="135" y2="100"/>
    <line x1="135" y1="100" x2="125" y2="180"/>
    <line x1="125" y1="180" x2="105" y2="215"/>
    <line x1="220" y1="130" x2="185" y2="100"/>
    <line x1="185" y1="100" x2="195" y2="180"/>
    <line x1="195" y1="180" x2="215" y2="215"/>
    <line x1="100" y1="130" x2="220" y2="130" opacity="0.25"/>
    <line x1="125" y1="180" x2="195" y2="180" opacity="0.25"/>
  </g>
</svg>
